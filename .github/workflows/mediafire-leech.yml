name: MediaFire to GitHub Release Leech

on:
  workflow_dispatch:
    inputs:
      mf_url:
        description: 'MediaFire Page URL or Direct Link'
        required: true
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Required Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          pip install mediafire-dl

      - name: Download File from MediaFire
        run: |
          URL="${{ inputs.mf_url }}"
          echo "Target URL: $URL"
          
          mkdir -p download_dir
          cd download_dir
          
          # Try mediafire-dl first, fallback to aria2c if it's a direct link
          mediafire-dl "$URL" || {
            echo "mediafire-dl encountered an error. Attempting aria2c fallback..."
            aria2c -x 16 -s 16 -k 1M "$URL"
          }
          
          cd ..

      - name: Process and Split File
        run: |
          mkdir -p release_assets
          
          # Locate the downloaded file
          FILE_PATH=$(find ./download_dir -type f | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "CRITICAL ERROR: No file was downloaded. Check URL or MediaFire CAPTCHA restrictions."
            exit 1
          fi
          
          FILE_NAME=$(basename "$FILE_PATH")
          FILE_SIZE=$(stat -c%s "$FILE_PATH")
          
          echo "Identified File: $FILE_NAME"
          echo "Size: $FILE_SIZE bytes"
          
          # Max size threshold set to 1.5GB (1610612736 bytes) to safely bypass GitHub's 2GB limit
          MAX_SIZE=1610612736
          
          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo "Warning: File exceeds 1.5GB threshold. Initiating auto-split process..."
            split -b 1500M "$FILE_PATH" "release_assets/${FILE_NAME}.part_"
            echo "Split complete."
          else
            echo "File is within limits. Proceeding without split."
            mv "$FILE_PATH" release_assets/
          fi

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "MF-Transfer-${{ github.run_number }}"
          name: "MediaFire Transfer #${{ github.run_number }}"
          body: |
            Automated transfer completed.
            Source URL: ${{ inputs.mf_url }}
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
