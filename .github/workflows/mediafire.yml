name: Manual MediaFire to Release

on:
  workflow_dispatch:
    inputs:
      mediafire_url:
        description: 'لینک صفحه مدیافایر'
        required: true
        type: string
      release_tag:
        description: 'تگ رلیز گیت‌هاب (مثلاً v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Download from MediaFire
        run: |
          # ۱. استخراج لینک مستقیم
          HTML_SOURCE=$(curl -sL "${{ github.event.inputs.mediafire_url }}")
          DIRECT_URL=$(echo "$HTML_SOURCE" | grep -oE 'https://download[0-9]+.mediafire.com/[^\s"'\''><]+' | head -n 1)
          
          if [ -z "$DIRECT_URL" ]; then
            echo "خطا در استخراج لینک مستقیم!"
            exit 1
          fi
          
          echo "لینک مستقیم: $DIRECT_URL"
          
          # ۲. دانلود فایل با نام اصلی
          curl -L -O -J "$DIRECT_URL"
          
          # ۳. ثبت نام فایل برای مرحله بعد
          FILENAME=$(ls -p | grep -v / | head -n 1)
          echo "DOWNLOADED_FILE=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ env.DOWNLOADED_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
