name: Manual MediaFire to Release Large File

on:
  workflow_dispatch:
    inputs:
      mediafire_url:
        description: 'MediaFire Page URL'
        required: true
        type: string
      release_tag:
        description: 'GitHub Release Tag e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download_split_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          df -h

      - name: Extract Direct Link via Python
        id: extract
        env:
          INPUT_URL: ${{ github.event.inputs.mediafire_url }}
        run: |
          cat << 'EOF' > extract.py
          import urllib.request
          import re
          import os
          import sys

          url = os.environ['INPUT_URL']
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.9',
              'Connection': 'keep-alive'
          }
          
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req) as response:
                  html = response.read().decode('utf-8')
          except Exception as e:
              print(f"::error::Failed to connect to MediaFire: {e}")
              sys.exit(1)

          matches = re.findall(r'href="(https://download[0-9a-zA-Z.]+\.mediafire\.com/[^\s"\'><]+)"', html)
          
          if not matches:
              matches = re.findall(r'https://download[0-9a-zA-Z.]+\.mediafire\.com/[^\s"\'><]+', html)

          if not matches:
              print("::error::Could not find the direct download link.")
              print("MediaFire is likely showing a Captcha or an 'Authorize Download' page to GitHub's server IP.")
              sys.exit(1)

          direct_url = matches[0].replace('"', '').strip()
          print(f"Extracted URL: {direct_url}")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"direct_url={direct_url}\n")
          EOF
          python3 extract.py

      - name: Download Large File
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64)" --content-disposition "${{ steps.extract.outputs.direct_url }}"
          
          FILENAME=$(ls -p | grep -v / | grep -v "extract.py" | head -n 1)
          echo "Downloaded file: $FILENAME"
          
          split -b 1900M "$FILENAME" "${FILENAME}.part"
          rm "$FILENAME"
          ls -la

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            *.part*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
