name: Manual MediaFire to Release Large File

on:
  workflow_dispatch:
    inputs:
      mediafire_url:
        description: 'MediaFire Page URL'
        required: true
        type: string
      release_tag:
        description: 'GitHub Release Tag e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download_split_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          df -h

          # Keep looking for the main download button
      - name: Fetch and Download from MediaFire
        env:
          INPUT_URL: ${{ github.event.inputs.mediafire_url }}
        run: |
          echo "Processing URL: $INPUT_URL"
          
          DIRECT_URL=$(curl -sL "$INPUT_URL" | grep -i 'id="downloadButton"' | grep -o 'href="[^"]*"' | cut -d'"' -f2 | head -n 1)
          
          if [ -z "$DIRECT_URL" ]; then
            echo "::error::Error: Direct download link could not be extracted!"
            exit 1
          fi
          
          echo "Direct URL successfully extracted."
          
          wget --content-disposition "$DIRECT_URL"
          
          FILENAME=$(ls -p | grep -v / | head -n 1)
          echo "Downloaded filename: $FILENAME"
          
          split -b 1900M "$FILENAME" "${FILENAME}.part"
          
          rm "$FILENAME"
          ls -la

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            *.part*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
