name: Manual MediaFire to Release

on:
  workflow_dispatch:
    inputs:
      mediafire_url:
        description: 'لینک صفحه مدیافایر'
        required: true
        type: string
      release_tag:
        description: 'تگ رلیز گیت‌هاب (مثلاً v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Download from MediaFire
        env:
          INPUT_URL: ${{ github.event.inputs.mediafire_url }}
        run: |
          echo "شروع بررسی لینک مدیافایر..."
          
          # ۱. دانلود سورس صفحه به صورت امن
          HTML_SOURCE=$(curl -sL "$INPUT_URL")
          
          # ۲. استخراج دقیق لینک مستقیم از ویژگی href دکمه اصلی دانلود
          DIRECT_URL=$(echo "$HTML_SOURCE" | grep -oE 'href="https://[^"]+mediafire\.com[^"]+"' | head -n 1 | cut -d'"' -f2)
          
          # پشتیبان: اگر روش اول پیدا نکرد، از الگوی دوم استفاده کند
          if [ -z "$DIRECT_URL" ]; then
            DIRECT_URL=$(echo "$HTML_SOURCE" | grep -oE 'https://[a-zA-Z0-9.-]+\.mediafire\.com/[^\s"'\''><]+' | grep -E 'download|file' | head -n 1)
          fi
          
          # بررسی نهایی برای جلوگیری از ارور Malformed URL
          if [ -z "$DIRECT_URL" ] || [[ ! "$DIRECT_URL" =~ ^https?:// ]]; then
            echo "::error::خطا: نتوانستم لینک مستقیم دانلود را از این صفحه استخراج کنم!"
            echo "نکته: مطمئن شوید لینک شما مربوط به یک 'فایل' است، نه یک 'پوشه' (Folder)."
            exit 1
          fi
          
          echo "لینک مستقیم با موفقیت استخراج شد."
          
          # ۳. دانلود فایل واقعی با نام اصلی
          curl -L -O -J "$DIRECT_URL"
          
          # ۴. ثبت نام دقیق فایل برای مرحله رلیز
          FILENAME=$(ls -p | grep -v / | head -n 1)
          echo "نام فایل دریافت شده: $FILENAME"
          echo "DOWNLOADED_FILE=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ env.DOWNLOADED_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
